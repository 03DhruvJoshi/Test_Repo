name: Create Issue from Pull Request

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  create_issue:
    if: startsWith(github.head_ref, 'release-please--branches--main--components--root')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
      - name: Create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"
          gh issue create \
            --title "Release-please issue for Pull Request # ${{ github.event.pull_request.number }}" \
            --body "Issue created from pull request ${{ github.event.pull_request.html_url }}"
