name: Create Issue from Pull Request

on:
  pull_request:
    types: [opened, edited]

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Create Issue
        uses: actions/create-issue@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          title: "New Issue from Pull Request: ${{ github.event.pull_request.number }}"
