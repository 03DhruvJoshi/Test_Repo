name: Create Issue from Pull Request

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  create_issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up GitHub CLI
        uses: actions/setup-gh-cli@v1

      - name: Create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"
          gh issue create \
            --title "Release-please issue for Pull Request # ${{ github.event.pull_request.number }}" \
            --body "Issue created from pull request ${{ github.event.pull_request.html_url }}"
