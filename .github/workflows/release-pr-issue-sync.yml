name: Create Issue from Pull Request

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  create_issue:
    if: startsWith(github.head_ref, 'release-please--branches--main--components--root')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
      - name: Create issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_URL=$(gh issue create \
            --title "Release-please issue for Pull Request # ${{ github.event.pull_request.number }}" \
            --body "Fixes #${{ github.event.issue.number }}")
          echo "ISSUE_URL=$ISSUE_URL"
      - name: Link pull request to issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --body "Fixes ${{ github.event.issue.number }} $ISSUE_URL"
