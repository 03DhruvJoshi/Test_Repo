name: Sync Issue Body

on:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created, edited]
  workflow_run:
    workflows: ["Create Issue from Pull Request"]
    types:
      - completed

jobs:
  sync_issue_body:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Extract Issue number
        run: |
          issue_number=${{ github.event.workflow_run.outputs.issue_number }}
          echo "Issue Number: $issue_number"

      - name: Extract Issue body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_BODY=$(gh issue view $issue_number --json body --jq '.body')
          echo "ISSUE_BODY=$ISSUE_BODY" >> $GITHUB_ENV

      - name: Check changes to issue body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIOUS_ISSUE_BODY="${{ github.event.workflow_run.outputs.pr_body }}"
          CURRENT_ISSUE_BODY="$ISSUE_BODY"
          if [ "$CURRENT_ISSUE_BODY" != "$PREVIOUS_ISSUE_BODY" ]; then
            echo "Issue body has changed, updating PR..."
            gh pr edit ${{ github.event.workflow_run.pull_requests[0].number }} --body "Fixes: #$issue_number\n$CURRENT_ISSUE_BODY"
          else 
            echo "Issue body has not changed, no action required."
          fi
